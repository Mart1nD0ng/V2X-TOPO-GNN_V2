# Operating point v1 — RE-CALIBRATED 2026-06 under axis-visibility LOS.
# Report: docs/OPERATING_POINT_RECALIBRATION_CN.md. Original design:
# docs/COUPLING_AND_OPERATING_POINT_DESIGN.md.
#
# WHY RE-CALIBRATED: the original point was tuned "hard / load-coupled" while the candidate
# graph still used the buggy `road_segment` LOS rule (mislabels ~30% of collinear cross-block
# edges as NLOS -> a globally pessimistic channel). The audit C-1 fix (los_model: axis_visibility)
# corrected the channel, which made it much easier and COLLAPSED the old coupled C/D/E Pareto:
# the "w=5 sweet spot" / "w=0 pathologically dominated" story was substantially a road_segment
# artifact (with the correct channel, flooding still gives the BEST reliability).
#
# RE-CALIBRATION: under the correct axis-visibility channel we restore a genuinely hard,
# load-coupled point by hardening the physically-honest axis of a dense, congested band -- the
# INTERFERENCE floor (-80 dBm) and its DENSITY COUPLING (30 dB, applied to the SELECTED in-load,
# v2x_consensus_bridge.py) -- NOT by reintroducing the LOS artifact or lowering Tx/MCS (kept
# standard 23 dBm / 8 dB). The out-degree cap is a LOOSE CEILING (8) so the planner can over-flare
# and the cost terms regularise it DOWN to the load-optimal effective degree (effective degree is
# adaptive; the cap is not the lever).
#
#   density 200 veh/km^2  x  hard_low_confidence  x  -80 dBm + 30 dB load coupling  x  cap 8 (axis-visibility LOS)
#
# VALIDATION (N=600, quenched eval Q=21; scripts/analysis/recalibrate_operating_point.py +
# run_de_ablation + run_pareto_frontier): de_ablation verdict "D/E EXERCISED & RESPONSIVE
# (coupling is real)" -- delay pressure cuts D 48%, energy pressure cuts E 49%, E responds
# INDEPENDENTLY of D. Multi-seed Pareto: rel-only (w=0) floods (F~0.052 stable across 5 seeds,
# D~135); a small cost weight (w~0.1) halves D/E for negligible reliability loss.
# HONEST REFRAME: w=0 is the reliability-optimal, HIGH-COST EXTREME -- NOT dominated. The
# cost-heavy tail (w>=0.25) shows ~1/3 bad-init variance (rugged landscape) -> always report
# multi-seed and operate at the knee (small w), under PCGrad governance.
operating_point_v1_name: operating_point_v1

# --- topology constructor (inherits production P0/P1/P2 remediations) ---
support_mode: topk
# LOOSE ceiling (re-calibration): the planner over-flares then the cost terms regularise it down
# to the load-optimal effective degree. Was 4 (which is degree-starved under axis-visibility LOS:
# F~0.22 vs ~0.05 at cap 8). Effective degree, not the cap, is the lever.
max_out_degree: 8
topk_backend: segmented_fast
gradient_mode: straight_through_full_candidate
straight_through_temperature: 1.0

# --- candidate graph: geometric axis-visibility LOS (audit C-1 fix: match the paper's claimed
# channel and paper_environment_v1; the code default `road_segment` mislabels ~30% of collinear
# cross-block edges as NLOS). Radius / candidate cap stay at the production-profile values. ---
candidate_graph:
  los_model: axis_visibility

# --- candidate-graph feature channel: mirrors the evaluator's base interference floor (-80 dBm)
# so the SINR the scorer sees matches the channel it is graded against. Feature-side density
# coupling stays 0 (historical); the load coupling lives on the evaluator (physical:) side. ---
channel:
  tx_power_dbm: 23.0
  mcs_threshold_db: 8.0
  transition_width_db: 3.0
  interference_proxy_dbm: -80.0

# --- scorer / model ---
hidden_dim: 64
message_layers: 2
init_mode: deterministic
use_structural_score_bias: false
learnable_score_gain: true
score_output_gain: 10.0
score_standardization: true

# --- loss (scale-invariant backward) ---
scale_invariant_backward: true
scale_reference_node_count: 100.0
# The operating point is hard: the reliability FLOOR (flooded topology, quenched eval Q=21) is
# ~0.05, not 0.01-0.02. The target below is the loss anchor used during validation; the gate
# rarely engages (F stays above it), so the cost terms compete against reliability directly along
# the Pareto. (The D/E ablation / pareto harnesses override this via --reliability-target.)
reliability_failure_target: 0.02
delay_target_rounds: 5.0
energy_target_j: 0.014

# --- evaluator physical layer: load-aware finite-blocklength. RE-CALIBRATED for axis-visibility:
# interference floor -80 dBm (congested band) and STRONG 30 dB density coupling on the selected
# in-load -> link_success stays sub-unity even at the optimal topology, so n_tx = 1/link_success
# (hence D and E) is topology-controllable. Tx/MCS unchanged (standard 23 dBm / 8 dB). ---
physical:
  tx_power_dbm: 23.0
  mcs_threshold_db: 8.0
  transition_width_db: 3.0
  interference_proxy_dbm: -80.0
  interference_density_coupling_db: 30.0
  interference_reference_load: 1.0
  finite_blocklength_reliability: true
  payload_bits: 100.0
  resource_block_count: 4.0
  subcarrier_spacing_hz: 15000.0
  single_hop_delay_s: 0.001

# --- energy proxy: retransmission-aware (B-fix-2) makes E topology-controllable ---
energy:
  retransmission_aware: true
  retransmission_success_floor: 0.001

# --- delay proxy: structural delay (D-fix-A, docs/STRUCTURAL_DELAY_MODEL_DESIGN.md). Per-hop
# time scaled by n_tx = 1/link_success so the effective-rounds delay the loss optimizes is
# topology-controllable. Option A (chosen): accept that D is then proportional to E (both ride
# the shared retransmission lever) -> "coupled C/D/E, link-quality-controllable". ---
# NOTE (P1-2): if you add `structural_delay_reduce: max` here, you MUST retune
# delay_target_rounds/delay_tau — the slowest-query D sits orders of magnitude above the
# protocol-era target 5.0 and L_D would dominate the loss (run_de_ablation --delay-reduce
# recalibrates automatically from the untrained D; manual configs must do the same).
delay:
  structural_delay: true
  structural_success_floor: 0.001

# --- evaluator currency (P0-1): quenched closed form is the single baseline currency ---
# Train at Q=11, report headline F at eval Q=21. Q=1 (mean-field) is 22x optimistic and is banned
# as a reliability currency (scripts/harness/verify_no_mean_field_reliability_claim.py). The D/E
# ablation / pareto / trust-region harnesses that load this config now report quenched F by default.
quenched_quadrature: 11
eval_quenched_quadrature: 21

# --- optimization ---
optimizer: adam
learning_rate: 0.005
max_steps: 50
seed: 7

# --- environment: density-matched operating point (200 veh/km^2), hard confidence ---
# Validated at N=2000 (Track A confirm). vehicle_count here is the nominal scale; the
# D/E ablation overrides --node-count.
vehicle_count: 2000
vehicle_profile: density_matched
node_density_per_km2: 200.0
avalanche_profile: small_realistic
training_profile: hard_low_confidence

# --- #5 spatially-structured initial confidence (default OFF = uniform/legacy) ---
# When enabled, ic_i varies with distance to an event anchor (near the event -> better initial
# info), with the spatial MEAN anchored to the profile scalar so the baseline reliability is
# unchanged (any change is attributable to spatial STRUCTURE, not a shifted average). This restores
# a mechanism for the topology to matter (route uncertain far nodes toward confident near-event
# nodes). iw stays uniform (far nodes lack info -> undecided, not wrong).
spatial_ic:
  enabled: false
  anchor_xy_frac: [0.15, 0.15]   # event location as a fraction of the scene bounding box
  decay_length_frac: 0.35        # confidence decay length as a fraction of the box diagonal
  contrast: 1.0                  # 0 = uniform, 1 = full spatial envelope
  spread: 0.8                    # spatial amplitude as a fraction of the in-bounds headroom
